[package]
name = "signapps-oauth"
version.workspace = true
edition = "2021"
rust-version = "1.75"
license.workspace = true
description = "OAuth2/OIDC/SAML unified state machine, catalog, and scope resolver"
publish = false

[dependencies]
# Crypto primitives for HMAC state signing and PKCE verifier generation
hmac = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
# Catalog
serde = { workspace = true }
serde_json = { workspace = true }
# Errors + logging
thiserror = { workspace = true }
tracing = { workspace = true }
# DB
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls", "uuid", "chrono", "json"] }
uuid = { workspace = true }
chrono = { workspace = true }
# Shared
signapps-common = { path = "../signapps-common" }
signapps-keystore = { path = "../signapps-keystore" }
async-trait = { workspace = true }

[build-dependencies]
serde_json = { workspace = true }
url = "2"

[dev-dependencies]
tokio = { workspace = true }
