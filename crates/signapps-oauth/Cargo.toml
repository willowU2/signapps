[package]
name = "signapps-oauth"
version.workspace = true
edition = "2021"
rust-version = "1.75"
license.workspace = true
description = "OAuth2/OIDC/SAML unified state machine, catalog, and scope resolver"
publish = false

[[bin]]
name = "oauth-migrate-encrypt"
path = "src/bin/oauth_migrate_encrypt.rs"

[[bin]]
name = "oauth-migrate-verify"
path = "src/bin/oauth_migrate_verify.rs"

[dependencies]
# Crypto primitives for HMAC state signing and PKCE verifier generation
hmac = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
# Catalog
serde = { workspace = true }
serde_json = { workspace = true }
# Errors + logging
thiserror = { workspace = true }
tracing = { workspace = true }
# DB
sqlx = { workspace = true, features = ["postgres", "runtime-tokio-rustls", "uuid", "chrono", "json"] }
uuid = { workspace = true }
chrono = { workspace = true }
# Error handling + CLI
anyhow = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
# Shared
signapps-common = { path = "../signapps-common" }
signapps-keystore = { path = "../signapps-keystore" }
async-trait = { workspace = true }
# JSONPath for userinfo profile field extraction
jsonpath_lib = "0.3"
# JWT validation for OIDC id_token
jsonwebtoken = { workspace = true }
# HTTP client for token exchange + profile fetch
reqwest = { workspace = true }
url = "2"

[build-dependencies]
serde_json = { workspace = true }
url = "2"

[dev-dependencies]
tokio = { workspace = true }
wiremock = "0.6"
