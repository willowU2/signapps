[package]
name = "signapps-keystore"
version.workspace = true
edition = "2021"
rust-version.workspace = true
license.workspace = true
description = "Master key management and per-usage DEK derivation for encryption at rest"
publish = false

# NOTE: Several deps below are declared here in Task 1 (scaffold) but only
# used from Task 2+ onward. Declared up-front to minimize Cargo.toml churn
# across the foundation tasks.
[dependencies]
aes-gcm = { workspace = true }
hkdf = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
dashmap = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
zeroize = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tempfile = "3"
