services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: signapps-mailserver
    hostname: mail.signapps.local
    domainname: signapps.local
    ports:
      - "25:25" # SMTP (receiving from other MTA)
      - "143:143" # IMAP (STARTTLS)
      - "465:465" # SMTP (Implicit TLS)
      - "587:587" # SMTP (STARTTLS)
      - "993:993" # IMAP (Implicit TLS)
    environment:
      - TZ=Europe/Paris
      - TLS_LEVEL=modern
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/tmp/docker-mailserver/ssl/mail.signapps.local.crt
      - SSL_KEY_PATH=/tmp/docker-mailserver/ssl/mail.signapps.local.key
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ONE_DIR=1
      - ENABLE_POP3=1
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - ./data/mail/mail-logs:/var/log/mail
      - ./data/mail/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
    restart: always
    cap_add:
      - NET_ADMIN
volumes:
  mail-state:
  mail-data: