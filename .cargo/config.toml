# Cargo configuration for SignApps Platform
# Optimizations and linting settings

[build]
# Use incremental compilation for faster rebuilds
incremental = true

[target.x86_64-unknown-linux-gnu]
# Use mold linker if available (faster linking)
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-pc-windows-msvc]
# Windows-specific settings
rustflags = ["-C", "target-feature=+crt-static"]

[env]
# Default environment variables for development
RUST_BACKTRACE = "1"
RUST_LOG = "info,signapps=debug,sqlx=warn"

[alias]
# Useful aliases for development
b = "build"
c = "check"
t = "test"
r = "run"
fmt = "fmt --all"
lint = "clippy --workspace --all-targets --all-features -- -D warnings"
doc = "doc --no-deps --workspace"

# Full check before commit
precommit = ["fmt", "lint", "test"]
