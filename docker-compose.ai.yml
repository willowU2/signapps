version: '3.8'

# Docker Compose for AI services
# Usage: docker-compose -f docker-compose.yml -f docker-compose.ai.yml up -d
#
# Options:
# - Ollama (CPU/GPU, simple setup): docker-compose -f ... up -d ollama
# - vLLM (GPU only, high performance): docker-compose -f ... up -d vllm embeddings

services:
  # ============================================================================
  # OPTION 1: OLLAMA (Recommandé pour démarrer, CPU/GPU)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: signapps-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_ORIGINS: "*"
      # Décommenter pour GPU NVIDIA:
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - signapps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Setup Ollama models au premier démarrage
  ollama-setup:
    image: curlimages/curl:latest
    container_name: signapps-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Pulling Ollama models ==="
        echo "Pulling llama3.2:3b (chat, ~2GB)..."
        curl -s -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2:3b"}'
        echo ""
        echo "Pulling nomic-embed-text (embeddings, ~275MB)..."
        curl -s -X POST http://ollama:11434/api/pull -d '{"name": "nomic-embed-text"}'
        echo ""
        echo "=== Models ready! ==="
    networks:
      - signapps-network
    profiles:
      - setup

  # ============================================================================
  # OPTION 2: vLLM (GPU requis, haute performance)
  # Auto-selectionne le modele en fonction de la VRAM disponible.
  # ============================================================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: signapps-vllm
    entrypoint: ["/bin/bash", "/scripts/vllm-entrypoint.sh"]
    volumes:
      - vllm_cache:/root/.cache/huggingface
      - ./scripts/vllm-entrypoint.sh:/scripts/vllm-entrypoint.sh:ro
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - signapps-network
    restart: unless-stopped
    profiles:
      - vllm

  # Version CPU des embeddings (si pas de GPU dispo pour embeddings)
  embeddings-cpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: signapps-embeddings-cpu
    command:
      - "--model-id=sentence-transformers/all-MiniLM-L6-v2"
      - "--port=8080"
    ports:
      - "8001:8080"
    networks:
      - signapps-network
    restart: unless-stopped
    profiles:
      - cpu

  # ============================================================================
  # SIGNAPPS AI SERVICE - Configuration multi-provider
  # ============================================================================
  signapps-ai:
    environment:
      # Provider principal (ollama, vllm, openai, anthropic)
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}

      # Ollama config
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}

      # vLLM config (model auto-detected via /v1/models)
      VLLM_URL: http://vllm:8000

      # Embeddings
      EMBEDDINGS_URL: ${EMBEDDINGS_URL:-http://ollama:11434}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-nomic-embed-text}

      # OpenAI (optionnel)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      # Anthropic (optionnel)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}

volumes:
  ollama_data:
  vllm_cache:

# Profiles disponibles:
# - (default): Ollama uniquement
# - vllm: vLLM avec auto-selection du modele selon la VRAM GPU
# - cpu: Embeddings CPU uniquement (pas de contention GPU)
# - setup: Telecharge les modeles Ollama
#
# Exemples:
# docker-compose -f docker-compose.yml -f docker-compose.ai.yml up -d
# docker-compose -f docker-compose.yml -f docker-compose.ai.yml --profile vllm up -d vllm
# docker-compose -f docker-compose.yml -f docker-compose.ai.yml --profile cpu up -d embeddings-cpu
# docker-compose -f docker-compose.yml -f docker-compose.ai.yml --profile setup up ollama-setup
