# Clippy configuration for SignApps Platform
# Run: cargo clippy --workspace --all-targets --all-features

# Allow cognitive complexity up to this value
cognitive-complexity-threshold = 30

# Maximum number of lines in a function body
too-many-lines-threshold = 150

# Maximum number of arguments a function can have
too-many-arguments-threshold = 8

# Minimum number of struct fields for the constructor lint
max-struct-bools = 3

# Minimum number of function parameters for the excessive bools lint
max-fn-params-bools = 3

# The maximum byte size a `Copy` type can have
trivial-copy-size-limit = 16

# Allow using result patterns in functions returning Result
pass-by-value-size-limit = 256

# MSRV for suggesting newer syntax
msrv = "1.75.0"

# Allowed wildcard imports
allowed-wildcard-imports = [
    "crate::prelude::*",
]

# ─── unwrap_used tracking ────────────────────────────────────────────────────
# Goal: eliminate `.unwrap()` callsites in favour of `?` or `.context("…")`.
# Currently ~412 callsites exist across the workspace (inventoried 2026-03-30).
#
# Enforcement roadmap:
#   Phase 1 (now)     — Warn per-crate by adding `#![warn(clippy::unwrap_used)]`
#                       to new crates and lib.rs files as they are touched.
#   Phase 2 (ongoing) — Fix callsites crate-by-crate; promote to error crate
#                       by crate once clean.
#   Phase 3 (target)  — Workspace-level deny via `disallowed-methods` below.
#
# Uncomment once Phase 3 is reached:
# disallowed-methods = [
#   { path = "std::result::Result::unwrap", reason = "Use ? or .context() instead" },
#   { path = "std::option::Option::unwrap", reason = "Use .ok_or_else() or .expect() with a message" },
# ]
