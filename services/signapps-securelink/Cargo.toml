[package]
name = "signapps-securelink"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Web Tunnel VPN service - access home services without opening ports"
default-run = "signapps-securelink"

[lib]
name = "signapps_securelink"
path = "src/lib.rs"

[[bin]]
name = "signapps-securelink"
path = "src/main.rs"

[features]
default = []
# Enable mesh VPN features (requires database)
mesh-vpn = ["dep:signapps-db", "dep:sqlx"]
# Enable DHCP/NTP server (requires database + signapps-dns-server)
dhcp-server = ["dep:signapps-db", "dep:signapps-dns-server", "dep:sqlx"]

[dependencies]
mimalloc = { workspace = true }
# Common (error types, result)
signapps-common = { path = "../../crates/signapps-common" }
# Always-on dependencies for the lib + legacy bin
signapps-service = { path = "../../crates/signapps-service" }
anyhow = { workspace = true }

# OpenAPI documentation
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

# Core
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tower-http = { workspace = true }

# Web tunnel dependencies
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# DNS dependencies (optional, for ad-blocking)
hickory-resolver = "0.24"

# Config serialization
serde_yaml = "0.9"

# Environment
dotenvy = "0.15"

# Optional: Database support for mesh VPN / DHCP
signapps-db = { path = "../../crates/signapps-db", optional = true }
signapps-dns-server = { path = "../../crates/signapps-dns-server", optional = true }
sqlx = { workspace = true, optional = true }
