[package]
name = "signapps-media"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Media processing service for SignApps - OCR, TTS, STT"

[dependencies]
mimalloc = { workspace = true }
# Web framework
axum = { version = "0.7", features = ["multipart", "ws"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client for calling external services
reqwest = { version = "0.12", features = ["json", "multipart", "stream"] }

# Database
sqlx = { version = "0.7", features = ["postgres", "runtime-tokio", "uuid", "chrono"] }

# Auth & common
signapps-common = { path = "../../crates/signapps-common" }

# Runtime (hardware detection, model management)
signapps-runtime = { path = "../../crates/signapps-runtime" }

# File handling
tokio-util = { version = "0.7", features = ["io"] }
bytes = "1"
mime_guess = "2"
tempfile = "3"

# Async utilities
futures = "0.3"
futures-util = "0.3"
async-stream = "0.3"
async-trait = "0.1"
tokio-stream = "0.1"

# Concurrent data structures
dashmap = "6"

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Config
dotenvy = "0.15"

# Base64 for audio encoding
base64 = "0.22"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# OpenAPI
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

# URL encoding
urlencoding = "2.1"

# Native STT (whisper.cpp bindings)
whisper-rs = { version = "0.15", optional = true }

# Audio decoding (multi-format → PCM)
symphonia = { version = "0.5", features = ["mp3", "ogg", "flac", "wav", "pcm", "aac"], optional = true }
hound = { version = "3.5", optional = true }

# Native TTS (Piper ONNX)
piper-rs = { version = "0.1", optional = true }

# Native OCR
ocrs = { version = "0.11", optional = true }
rten = { version = "0.22", optional = true }
rten-imageproc = { version = "0.22", optional = true }
image = { version = "0.25", optional = true }

[features]
default = []
native-stt = ["dep:whisper-rs", "dep:symphonia", "dep:hound"]
native-tts = ["dep:piper-rs", "dep:hound"]
native-ocr = ["dep:ocrs", "dep:rten", "dep:rten-imageproc", "dep:image"]
cuda = ["whisper-rs/cuda"]
metal = ["whisper-rs/metal"]
