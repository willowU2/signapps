[package]
name = "signapps-billing"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Billing service for SignApps Platform — plans and invoices"
default-run = "signapps-billing"

[lib]
name = "signapps_billing"
path = "src/lib.rs"

[[bin]]
name = "signapps-billing"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-db = { path = "../../crates/signapps-db" }
signapps-service = { path = "../../crates/signapps-service" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
# EX3: Stripe integration
reqwest = { workspace = true }
hmac = "0.12"
sha2 = "0.10"
hex = { workspace = true }
utoipa = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tower = { workspace = true }
