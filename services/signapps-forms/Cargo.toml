[package]
name = "signapps-forms"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Forms builder service for SignApps Platform (Google Forms equivalent)"

[[bin]]
name = "signapps-forms"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-sharing = { path = "../../crates/signapps-sharing" }
signapps-cache = { path = "../../crates/signapps-cache" }
sqlx = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
