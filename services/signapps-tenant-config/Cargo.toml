[package]
name = "signapps-tenant-config"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Tenant configuration service — branding (logo, colors, app name) and CSS overrides for SignApps Platform"
default-run = "signapps-tenant-config"

[lib]
name = "signapps_tenant_config"
path = "src/lib.rs"

[[bin]]
name = "signapps-tenant-config"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Internal crates
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-db = { path = "../../crates/signapps-db" }
signapps-service = { path = "../../crates/signapps-service" }

# Web framework
axum = { workspace = true }
tower-http = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
validator = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tower = { workspace = true }
