[package]
name = "signapps-containers"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Container management service for SignApps Platform"
default-run = "signapps-containers"

[lib]
name = "signapps_containers"
path = "src/lib.rs"

[[bin]]
name = "signapps-containers"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-service = { path = "../../crates/signapps-service" }
axum = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
bollard = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
futures = { workspace = true }
futures-util = "0.3"
reqwest = { workspace = true }
serde_yaml = "0.9"
regex = "1"
async-stream = { workspace = true }
dashmap = { workspace = true }
jsonwebtoken = { workspace = true }
rand = { workspace = true }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
