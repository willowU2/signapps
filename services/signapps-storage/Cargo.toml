[package]
name = "signapps-storage"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Storage and RAID management service for SignApps Platform"

[[bin]]
name = "signapps-storage"
path = "src/main.rs"

[dependencies]
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }
signapps-cache = { path = "../../crates/signapps-cache" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
opendal = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
bytes = { workspace = true }
mime_guess = { workspace = true }
sysinfo = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
urlencoding = "2"
once_cell = { workspace = true }
bcrypt = "0.18.0"
reqwest = { version = "0.11", features = ["json"] }
tokio-cron-scheduler = "0.13.0"

# Image processing for thumbnails/previews
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif"] }

# PDF metadata extraction
lopdf = "0.33"

# Archive listing (ZIP)
zip = { version = "2.1", default-features = false, features = ["deflate"] }
pdfium-render = { version = "0.8.37", features = ["thread_safe"] }

# Cryptographic hashing for file deduplication
sha2 = { workspace = true }
hex = { workspace = true }
