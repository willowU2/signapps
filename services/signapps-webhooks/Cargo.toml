[package]
name = "signapps-webhooks-svc"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Webhooks service — outbound webhook management and incoming webhook receiver for SignApps Platform"

[[bin]]
name = "signapps-webhooks"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Internal crates
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }

# Web framework
axum = { workspace = true }
tower-http = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

# HTTP Client (outbound webhook dispatch)
reqwest = { workspace = true }
url = "2"

# Cryptography (webhook HMAC signing)
hmac = "0.12"
sha2 = "0.10"

[dev-dependencies]
tokio-test = { workspace = true }
tower = { workspace = true }
