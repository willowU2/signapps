[package]
name = "signapps-dc"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "SignApps Domain Controller — LDAP, Kerberos KDC, DNS integration"
default-run = "signapps-dc"

[[bin]]
name = "signapps-dc"
path = "src/main.rs"

[dependencies]
# Internal crates
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }
signapps-ad-core = { path = "../../crates/signapps-ad-core" }
signapps-ldap-server = { path = "../../crates/signapps-ldap-server" }
signapps-kerberos-kdc = { path = "../../crates/signapps-kerberos-kdc" }
signapps-dns-server = { path = "../../crates/signapps-dns-server" }

# Web framework
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
dotenvy = { workspace = true }
config = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
