[package]
name = "signapps-ai"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "AI/RAG service for SignApps Platform"

[[bin]]
name = "signapps-ai"
path = "src/main.rs"

[dependencies]
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }
signapps-runtime = { path = "../../crates/signapps-runtime" }
axum = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
opendal = { workspace = true }
async-openai = { workspace = true }
reqwest = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
futures-util = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }

# Native LLM inference
llama-cpp-2 = { version = "0.1", optional = true }

[features]
default = []
native-llm = ["dep:llama-cpp-2"]
cuda = ["llama-cpp-2/cuda"]
metal = ["llama-cpp-2/metal"]
vulkan = ["llama-cpp-2/vulkan"]
