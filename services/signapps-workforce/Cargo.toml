[package]
name = "signapps-workforce"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Workforce planning and organizational structure management for SignApps Platform"
default-run = "signapps-workforce"

[lib]
name = "signapps_workforce"
path = "src/lib.rs"

[[bin]]
name = "signapps-workforce"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Post S1 cutover: workforce is HR-only. AD / ldap3 / keystore deps
# migrated to `signapps-org` along with the handlers that used them.
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-service = { path = "../../crates/signapps-service" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
validator = { workspace = true }
reqwest = { workspace = true }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
