[package]
name = "signapps-workforce"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Workforce planning and organizational structure management for SignApps Platform"
default-run = "signapps-workforce"

[lib]
name = "signapps_workforce"
path = "src/lib.rs"

[[bin]]
name = "signapps-workforce"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-service = { path = "../../crates/signapps-service" }
signapps-ad-core = { path = "../../crates/signapps-ad-core" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
validator = { workspace = true }
reqwest = { workspace = true }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
