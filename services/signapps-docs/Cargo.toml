[package]
name = "signapps-docs"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros", "ws"] }
tokio = { version = "1.36", features = ["full"] }
tokio-tungstenite = "0.21"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
tower-layer = "0.1"

# CRDT
yrs = "0.17"
lib0 = "0.16"

# Data
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "postgres", "uuid", "chrono", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Utilities
tokio-util = { version = "0.7", features = ["codec"] }
futures = "0.3"
anyhow = "1.0"
thiserror = "1.0"
dashmap = "5.5"
moka = { version = "0.12", features = ["future"] }
tracing = "0.1"
tracing-subscriber = "0.3"

# ─── Office sub-service dependencies (merged from signapps-office, port 3018) ──

# Document formats
docx-rs = "0.4"
rust_xlsxwriter = "0.79"
calamine = "0.26"
shiva = { version = "1.4", features = ["all"] }

# PDF
printpdf = "0.7"
lopdf = "0.33"

# Markdown & HTML
comrak = "0.31"
scraper = "0.20"

# EPUB
rbook = "0.5"

# Image rendering (for slide export)
resvg = "0.44"
usvg = "0.44"
tiny-skia = "0.11"

# Office-specific utilities
tempfile = "3"
bytes = { workspace = true }
mime_guess = { workspace = true }
base64 = "0.22"
zip = { version = "2.0", default-features = false, features = ["deflate"] }

# ─── Workspace crates ──────────────────────────────────────────────────────────
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }
signapps-cache = { path = "../../crates/signapps-cache" }
signapps-sharing = { path = "../../crates/signapps-sharing" }
dotenvy.workspace = true
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

[dev-dependencies]
