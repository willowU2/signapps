[package]
name = "signapps-org"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Organizational structure service — nodes, trees, assignments, orgchart for SignApps Platform"
default-run = "signapps-org"

[lib]
name = "signapps_org"
path = "src/lib.rs"

[[bin]]
name = "signapps-org"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
# Internal crates
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-service = { path = "../../crates/signapps-service" }
signapps-keystore = { path = "../../crates/signapps-keystore" }

# Web framework
axum = { workspace = true }
tower-http = { workspace = true }

# Async
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }

# LDAP / AD sync (W3 use)
ldap3 = "0.11"

# HMAC for signed grant tokens (W5 use)
hmac = "0.12"
sha2 = "0.10"

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

# OpenAPI
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tower = { workspace = true }
