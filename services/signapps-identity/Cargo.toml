[package]
name = "signapps-identity"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Identity and authentication service for SignApps Platform"
default-run = "signapps-identity"

[lib]
name = "signapps_identity"
path = "src/lib.rs"

[[bin]]
name = "signapps-identity"
path = "src/main.rs"

[[bin]]
name = "seed_db"
path = "src/bin/seed.rs"

[dependencies]
mimalloc = { workspace = true }
# Internal crates
signapps-cache = { path = "../../crates/signapps-cache" }
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-keystore = { path = "../../crates/signapps-keystore" }
signapps-oauth = { path = "../../crates/signapps-oauth" }
signapps-service = { path = "../../crates/signapps-service" }

# Web framework
axum = { workspace = true }
axum-extra = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Async
tokio = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Database
sqlx = { workspace = true }

# Authentication
jsonwebtoken = { workspace = true }
argon2 = { workspace = true }
totp-rs = { workspace = true }
oauth2 = { workspace = true }
ldap3 = { workspace = true }

# Utilities
uuid = { workspace = true }
chrono = { workspace = true }
dotenvy = { workspace = true }
config = { workspace = true }
validator = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

# OpenAPI
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }

# Encoding
base64 = "0.22"
rand = "0.8"

# Cryptography (webhook signing + LDAP password encryption)
hmac = "0.12"
sha2 = "0.10"
aes-gcm = { workspace = true }
hex = { workspace = true }

# HTTP Client (for webhooks)
reqwest = { workspace = true }
url = "2"
urlencoding = "2"

[dev-dependencies]
tokio-test = { workspace = true }
tower = { workspace = true }
