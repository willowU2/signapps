[package]
name = "signapps-mail"
version = "0.1.0"
edition = "2021"
license.workspace = true
default-run = "signapps-mail"

[lib]
name = "signapps_mail"
path = "src/lib.rs"

[[bin]]
name = "signapps-mail"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "macros", "uuid", "chrono", "migrate"] }
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Authentication
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-oauth = { path = "../../crates/signapps-oauth" }
signapps-keystore = { path = "../../crates/signapps-keystore" }
signapps-service = { path = "../../crates/signapps-service" }
signapps-db = { path = "../../crates/signapps-db" }
anyhow = { workspace = true }
signapps-sharing = { path = "../../crates/signapps-sharing" }
signapps-cache = { path = "../../crates/signapps-cache" }

# Mail protocol crates
signapps-smtp = { path = "../../crates/signapps-smtp" }
signapps-imap = { path = "../../crates/signapps-imap" }
signapps-mime = { path = "../../crates/signapps-mime" }
signapps-dkim = { path = "../../crates/signapps-dkim" }
signapps-jmap = { path = "../../crates/signapps-jmap" }
signapps-dav = { path = "../../crates/signapps-dav" }
signapps-sieve = { path = "../../crates/signapps-sieve" }
signapps-spam = { path = "../../crates/signapps-spam" }

# IMAP/SMTP Backend
async-imap = { version = "0.11", default-features = false, features = ["runtime-tokio"] }
imap = { version = "2.4", default-features = false, features = ["tls"] }
lettre = { version = "0.11", default-features = false, features = ["tokio1", "tokio1-rustls-tls", "builder", "smtp-transport"] }
mailparse = "0.14.0"
oauth2 = "4.4.2"
tokio-cron-scheduler = "0.9.4"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

# TLS — native-tls for async_imap compatibility, rustls for CryptoProvider init
native-tls = "0.2"
tokio-native-tls = "0.3"
rustls = { version = "0.23", features = ["ring"] }
base64 = "0.22"
futures-util = "0.3.30"
thiserror = "1.0"
argon2 = "0.5"
sha2 = { workspace = true }
trust-dns-resolver = "0.23"

# OpenAPI
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono"] }
utoipa-swagger-ui = { version = "8", features = ["axum"] }

[dev-dependencies]
tower = "0.4"
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
