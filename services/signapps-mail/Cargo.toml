[package]
name = "signapps-mail"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "macros", "uuid", "chrono", "migrate"] }
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Authentication
signapps-common = { path = "../../crates/signapps-common" }

# IMAP/SMTP Backend
async-imap = { version = "0.9.1", default-features = false, features = ["runtime-tokio"] }
async-native-tls = "0.5"
native-tls = "0.2"
tokio-native-tls = "0.3"
lettre = { version = "0.11", default-features = false, features = ["tokio1", "tokio1-native-tls", "builder", "smtp-transport"] }
mailparse = "0.14.0"
oauth2 = "4.4.2"
tokio-cron-scheduler = "0.9.4"
reqwest = { version = "0.12", features = ["json", "native-tls"] }
base64 = "0.22"
futures-util = "0.3.30"
thiserror = "1.0"

# OpenAPI
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono"] }
utoipa-swagger-ui = { version = "8", features = ["axum"] }
