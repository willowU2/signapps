[package]
name = "signapps-office"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
axum = { workspace = true }
tokio = { workspace = true }
tower-http = { workspace = true }

# Document formats
docx-rust = "0.1.11"           # DOCX read/write
rust_xlsxwriter = "0.79"    # XLSX write
calamine = "0.26"           # XLSX/XLS/ODS read
shiva = { version = "1.4", features = ["all"] }  # Multi-format

# PDF
krilla = "0.6.0"              # PDF generation
pdf_oxide = "0.3"           # PDF extraction

# Markdown
comrak = "0.31"             # CommonMark + GFM

# EPUB
rbook = "0.5"               # EPUB read

# Utilities
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tempfile = "3"
bytes = { workspace = true }
mime_guess = { workspace = true }
moka = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Workspace
signapps-common = { path = "../../crates/signapps-common" }
