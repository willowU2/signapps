[package]
name = "signapps-scheduler"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "CRON job scheduler for SignApps Platform"
default-run = "signapps-scheduler"

[lib]
name = "signapps_scheduler"
path = "src/lib.rs"

[[bin]]
name = "signapps-scheduler"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-db = { path = "../../crates/signapps-db", features = ["openapi"] }
signapps-service = { path = "../../crates/signapps-service" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
reqwest = { version = "0.11", features = ["json"] }
futures = { workspace = true }
tokio-stream = { workspace = true, features = ["sync"] }
redis = { workspace = true }
async-stream = { workspace = true }
utoipa = { version = "5", features = ["uuid", "chrono"] }
utoipa-swagger-ui = { workspace = true }
