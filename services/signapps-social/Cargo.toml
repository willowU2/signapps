[package]
name = "signapps-social"
version = "0.1.0"
edition = "2021"
license.workspace = true
default-run = "signapps-social"

[lib]
name = "signapps_social"
path = "src/lib.rs"

[[bin]]
name = "signapps-social"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "macros", "uuid", "chrono", "json", "migrate"] }
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json"] }
async-trait = "0.1"
thiserror = "1.0"
anyhow = "1.0"
base64 = "0.22"
rand = "0.8"
sha2 = "0.10"
hex = "0.4"

urlencoding = "2.1"

signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }
signapps-oauth = { path = "../../crates/signapps-oauth" }
signapps-keystore = { path = "../../crates/signapps-keystore" }
signapps-service = { path = "../../crates/signapps-service" }
signapps-db = { path = "../../crates/signapps-db" }
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
