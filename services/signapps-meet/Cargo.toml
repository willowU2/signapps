[package]
name = "signapps-meet"
version = "0.1.0"
edition = "2021"
license.workspace = true
default-run = "signapps-meet"

[lib]
name = "signapps_meet"
path = "src/lib.rs"

[[bin]]
name = "signapps-meet"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-db = { path = "../../crates/signapps-db" }
signapps-service = { path = "../../crates/signapps-service" }
# Web framework
tokio = { version = "1.0", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "macros", "uuid", "chrono"] }

# Auth
signapps-common = { path = "../../crates/signapps-common", features = ["rbac"] }

# Transcription pipeline
signapps-transcription = { path = "../../crates/signapps-transcription" }

# HTTP client (storage, media, docs inter-service calls)
reqwest = { workspace = true }

# LiveKit Server (token issuance + RoomService/Egress)
signapps-livekit-client = { path = "../../crates/signapps-livekit-client" }

# UUID and time
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# LiveKit token generation
jsonwebtoken = "9.3"
base64 = "0.22"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Environment
dotenvy = "0.15"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Async streams (used by remote WebSocket handler)
futures = { workspace = true }

# In-memory concurrent maps (used by Q&A upvote dedup)
dashmap = { workspace = true }

# Password hashing
bcrypt = "0.15"

# Random generation
rand = "0.8"

# OpenAPI documentation
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true }
