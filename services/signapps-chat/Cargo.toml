[package]
name = "signapps-chat"
version.workspace = true
edition = "2021"
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Real-time chat service with WebSocket support for SignApps Platform"
default-run = "signapps-chat"

[lib]
name = "signapps_chat"
path = "src/lib.rs"

[[bin]]
name = "signapps-chat"
path = "src/main.rs"

[dependencies]
mimalloc = { workspace = true }
signapps-common = { path = "../../crates/signapps-common" }
signapps-db = { path = "../../crates/signapps-db" }
signapps-service = { path = "../../crates/signapps-service" }
signapps-sharing = { path = "../../crates/signapps-sharing" }
signapps-cache = { path = "../../crates/signapps-cache" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dotenvy = { workspace = true }
tower-http = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
dashmap = { workspace = true }
futures-util = { workspace = true }
sqlx = { workspace = true }
reqwest = { workspace = true }
utoipa = { workspace = true }
