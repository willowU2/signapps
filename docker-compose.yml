version: '3.8'

services:
  signapps-identity:
    build:
      context: .
      dockerfile: services/signapps-identity/Dockerfile
    container_name: signapps-identity
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3001:3000"
    networks:
      - signapps-network

  signapps-containers:
    build:
      context: .
      dockerfile: services/signapps-containers/Dockerfile
    container_name: signapps-containers
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3000"
    networks:
      - signapps-network

  signapps-proxy:
    build:
      context: .
      dockerfile: services/signapps-proxy/Dockerfile
    container_name: signapps-proxy
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3003:3000"
    networks:
      - signapps-network

  signapps-storage:
    build:
      context: .
      dockerfile: services/signapps-storage/Dockerfile
    container_name: signapps-storage
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      STORAGE_MODE: fs
      STORAGE_FS_ROOT: /data/storage
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - storage_data:/data/storage
    ports:
      - "3004:3000"
    networks:
      - signapps-network

  signapps-ai:
    build:
      context: .
      dockerfile: services/signapps-ai/Dockerfile
    container_name: signapps-ai
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      LLM_PROVIDER: ${LLM_PROVIDER:-llamacpp}
      MODELS_DIR: /data/models
      GPU_BACKEND: ${GPU_BACKEND:-auto}
      RUST_LOG: info,signapps=debug
    volumes:
      - models_data:/data/models
    ports:
      - "3005:3000"
    networks:
      - signapps-network

  signapps-securelink:
    build:
      context: .
      dockerfile: services/signapps-securelink/Dockerfile
    container_name: signapps-securelink
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    cap_add:
      - NET_ADMIN
    ports:
      - "3006:3000"
    networks:
      - signapps-network

  signapps-scheduler:
    build:
      context: .
      dockerfile: services/signapps-scheduler/Dockerfile
    container_name: signapps-scheduler
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3007:3000"
    networks:
      - signapps-network

  signapps-metrics:
    build:
      context: .
      dockerfile: services/signapps-metrics/Dockerfile
    container_name: signapps-metrics
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3008:3000"
    networks:
      - signapps-network

  signapps-media:
    build:
      context: .
      dockerfile: services/signapps-media/Dockerfile
    container_name: signapps-media
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      AI_URL: http://signapps-ai:3000/api/v1
      MODELS_DIR: /data/models
      RUST_LOG: info,signapps=debug
    volumes:
      - models_data:/data/models
    ports:
      - "3009:3009"
    networks:
      - signapps-network

networks:
  signapps-network:
    driver: bridge

volumes:
  storage_data:
  models_data:
