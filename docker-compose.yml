  #   command:
  #     - "--model=meta-llama/Llama-3.2-3B-Instruct"
  #     - "--host=0.0.0.0"
  #     - "--port=8000"
  #     - "--max-model-len=4096"
  #     - "--gpu-memory-utilization=0.9"
  #   environment:
  #     HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === Embeddings server (TEI) - Optionnel ===
  # embeddings:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   container_name: signapps-embeddings
  #   command:
  #     - "--model-id=sentence-transformers/all-MiniLM-L6-v2"
  #     - "--port=8080"
  #   ports:
  #     - "8001:8080"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === SERVICES SIGNAPPS ===
  signapps-identity:
    build:
      context: .
      dockerfile: services/signapps-identity/Dockerfile
    container_name: signapps-identity
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3001:3000"
    networks:
      - signapps-network

  signapps-containers:
    build:
      context: .
      dockerfile: services/signapps-containers/Dockerfile
    container_name: signapps-containers
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3000"
    networks:
      - signapps-network

  signapps-proxy:
    build:
      context: .
      dockerfile: services/signapps-proxy/Dockerfile
    container_name: signapps-proxy
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3003:3000"
    networks:
      - signapps-network

  signapps-storage:
    build:
      context: .
      dockerfile: services/signapps-storage/Dockerfile
    container_name: signapps-storage
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      STORAGE_MODE: fs
      STORAGE_FS_ROOT: /data/storage
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - storage_data:/data/storage
    ports:
      - "3004:3000"
    networks:
      - signapps-network

  signapps-ai:
    build:
      context: .
      dockerfile: services/signapps-ai/Dockerfile
    container_name: signapps-ai
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      VLLM_URL: http://vllm:8000
      EMBEDDINGS_URL: http://embeddings:8080
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3005:3000"
    networks:
      - signapps-network

  signapps-securelink:
    build:
      context: .
      dockerfile: services/signapps-securelink/Dockerfile
    container_name: signapps-securelink
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    cap_add:
      - NET_ADMIN
    ports:
      - "3006:3000"
    networks:
      - signapps-network

  signapps-scheduler:
    build:
      context: .
      dockerfile: services/signapps-scheduler/Dockerfile
    container_name: signapps-scheduler
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3007:3000"
    networks:
      - signapps-network

  signapps-metrics:
    build:
      context: .
      dockerfile: services/signapps-metrics/Dockerfile
    container_name: signapps-metrics
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3008:3000"
    networks:
      - signapps-network

  signapps-media:
    build:
      context: .
      dockerfile: services/signapps-media/Dockerfile
    container_name: signapps-media
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      AI_URL: http://signapps-ai:3000/api/v1
      MODELS_DIR: /data/models
      RUST_LOG: info,signapps=debug
    volumes:
      - models_data:/data/models
    ports:
      - "3009:3009"
    networks:
      - signapps-network

networks:
  signapps-network:
    driver: bridge

volumes:
  storage_data:
  models_data:
  vllm_cache:
