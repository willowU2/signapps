version: '3.8'

services:
  # === MEDIA PROCESSING (GPU) ===

  # Faster-Whisper STT (Speech-to-Text) - Using medium model for better accuracy
  faster-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: signapps-whisper
    environment:
      ASR_MODEL: medium
      ASR_ENGINE: faster_whisper
    ports:
      - "8100:9000"
    volumes:
      - whisper_cache:/root/.cache
    networks:
      - signapps-network
    restart: unless-stopped

  # Coqui TTS (Text-to-Speech) - Using French VITS model for natural voice
  piper:
    image: ghcr.io/coqui-ai/tts:latest
    container_name: signapps-piper
    entrypoint: ["python3", "-m", "TTS.server.server", "--model_name", "tts_models/fr/mai/tacotron2-DDC", "--use_cuda", "false"]
    ports:
      - "10200:5002"
    volumes:
      - piper_data:/root/.local/share/tts
    networks:
      - signapps-network
    restart: unless-stopped

  # OCR Service - PaddleOCR (high accuracy, multilingual, table detection)
  surya-ocr:
    build:
      context: ./services/paddleocr-server
      dockerfile: Dockerfile
    container_name: signapps-surya
    ports:
      - "8101:9003"
    networks:
      - signapps-network
    restart: unless-stopped

  # === LLM LOCAL (vLLM) - Optionnel, decommenter si GPU disponible ===
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: signapps-vllm
  #   command:
  #     - "--model=meta-llama/Llama-3.2-3B-Instruct"
  #     - "--host=0.0.0.0"
  #     - "--port=8000"
  #     - "--max-model-len=4096"
  #     - "--gpu-memory-utilization=0.9"
  #   environment:
  #     HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === Embeddings server (TEI) - Optionnel ===
  # embeddings:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   container_name: signapps-embeddings
  #   command:
  #     - "--model-id=sentence-transformers/all-MiniLM-L6-v2"
  #     - "--port=8080"
  #   ports:
  #     - "8001:8080"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === SERVICES SIGNAPPS ===
  signapps-identity:
    build:
      context: .
      dockerfile: services/signapps-identity/Dockerfile
    container_name: signapps-identity
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3001:3000"
    networks:
      - signapps-network

  signapps-containers:
    build:
      context: .
      dockerfile: services/signapps-containers/Dockerfile
    container_name: signapps-containers
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3000"
    networks:
      - signapps-network

  signapps-proxy:
    build:
      context: .
      dockerfile: services/signapps-proxy/Dockerfile
    container_name: signapps-proxy
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3003:3000"
    networks:
      - signapps-network

  signapps-storage:
    build:
      context: .
      dockerfile: services/signapps-storage/Dockerfile
    container_name: signapps-storage
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      STORAGE_MODE: fs
      STORAGE_FS_ROOT: /data/storage
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - storage_data:/data/storage
    ports:
      - "3004:3000"
    networks:
      - signapps-network

  signapps-ai:
    build:
      context: .
      dockerfile: services/signapps-ai/Dockerfile
    container_name: signapps-ai
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      VLLM_URL: http://vllm:8000
      EMBEDDINGS_URL: http://embeddings:8080
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3005:3000"
    networks:
      - signapps-network

  signapps-securelink:
    build:
      context: .
      dockerfile: services/signapps-securelink/Dockerfile
    container_name: signapps-securelink
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    cap_add:
      - NET_ADMIN
    ports:
      - "3006:3000"
    networks:
      - signapps-network

  signapps-scheduler:
    build:
      context: .
      dockerfile: services/signapps-scheduler/Dockerfile
    container_name: signapps-scheduler
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3007:3000"
    networks:
      - signapps-network

  signapps-metrics:
    build:
      context: .
      dockerfile: services/signapps-metrics/Dockerfile
    container_name: signapps-metrics
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    ports:
      - "3008:3000"
    networks:
      - signapps-network

  signapps-media:
    build:
      context: .
      dockerfile: services/signapps-media/Dockerfile
    container_name: signapps-media
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@host.docker.internal/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      STT_URL: http://faster-whisper:9000
      TTS_URL: http://piper:5002
      OCR_URL: http://surya-ocr:9003
      RUST_LOG: info,signapps=debug
    depends_on:
      faster-whisper:
        condition: service_started
      piper:
        condition: service_started
      surya-ocr:
        condition: service_started
    ports:
      - "3009:3009"
    networks:
      - signapps-network

networks:
  signapps-network:
    driver: bridge

volumes:
  storage_data:
  vllm_cache:
  whisper_cache:
  piper_data:
  surya_cache:
