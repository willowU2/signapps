version: '3.8'

services:
  # === BASE DE DONNÉES ===
  postgres:
    image: postgres:16-alpine
    container_name: signapps-postgres
    environment:
      POSTGRES_USER: signapps
      POSTGRES_PASSWORD: ${DB_PASSWORD:-signapps_dev}
      POSTGRES_DB: signapps
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signapps"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - signapps-network

  redis:
    image: redis:7-alpine
    container_name: signapps-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - signapps-network

  # === VECTOR DB ===
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: signapps-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - signapps-network

  # === STOCKAGE DOCUMENTS ===
  minio:
    image: minio/minio:latest
    container_name: signapps-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-signapps}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-signapps_dev}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - signapps-network

  # === MEDIA PROCESSING (GPU) ===

  # Faster-Whisper STT (Speech-to-Text) - Using medium model for better accuracy
  faster-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: signapps-whisper
    environment:
      ASR_MODEL: medium
      ASR_ENGINE: faster_whisper
    ports:
      - "8100:9000"
    volumes:
      - whisper_cache:/root/.cache
    networks:
      - signapps-network
    restart: unless-stopped

  # Coqui TTS (Text-to-Speech) - Using French VITS model for natural voice
  piper:
    image: ghcr.io/coqui-ai/tts:latest
    container_name: signapps-piper
    entrypoint: ["python3", "-m", "TTS.server.server", "--model_name", "tts_models/fr/mai/tacotron2-DDC", "--use_cuda", "false"]
    ports:
      - "10200:5002"
    volumes:
      - piper_data:/root/.local/share/tts
    networks:
      - signapps-network
    restart: unless-stopped

  # OCR Service - PaddleOCR (high accuracy, multilingual, table detection)
  surya-ocr:
    build:
      context: ./services/paddleocr-server
      dockerfile: Dockerfile
    container_name: signapps-surya
    ports:
      - "8101:9003"
    networks:
      - signapps-network
    restart: unless-stopped

  # === LLM LOCAL (vLLM) - Optionnel, décommenter si GPU disponible ===
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: signapps-vllm
  #   command:
  #     - "--model=meta-llama/Llama-3.2-3B-Instruct"
  #     - "--host=0.0.0.0"
  #     - "--port=8000"
  #     - "--max-model-len=4096"
  #     - "--gpu-memory-utilization=0.9"
  #   environment:
  #     HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === Embeddings server (TEI) - Optionnel ===
  # embeddings:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   container_name: signapps-embeddings
  #   command:
  #     - "--model-id=sentence-transformers/all-MiniLM-L6-v2"
  #     - "--port=8080"
  #   ports:
  #     - "8001:8080"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - signapps-network

  # === SERVICES SIGNAPPS ===
  signapps-identity:
    build:
      context: .
      dockerfile: services/signapps-identity/Dockerfile
    container_name: signapps-identity
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - signapps-network

  signapps-containers:
    build:
      context: .
      dockerfile: services/signapps-containers/Dockerfile
    container_name: signapps-containers
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    networks:
      - signapps-network

  signapps-proxy:
    build:
      context: .
      dockerfile: services/signapps-proxy/Dockerfile
    container_name: signapps-proxy
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3003:3000"
    networks:
      - signapps-network

  signapps-storage:
    build:
      context: .
      dockerfile: services/signapps-storage/Dockerfile
    container_name: signapps-storage
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-signapps}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-signapps_dev}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3004:3000"
    networks:
      - signapps-network

  signapps-ai:
    build:
      context: .
      dockerfile: services/signapps-ai/Dockerfile
    container_name: signapps-ai
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      QDRANT_URL: http://qdrant:6334
      VLLM_URL: http://vllm:8000
      EMBEDDINGS_URL: http://embeddings:8080
      MINIO_ENDPOINT: http://minio:9000
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "3005:3000"
    networks:
      - signapps-network

  signapps-securelink:
    build:
      context: .
      dockerfile: services/signapps-securelink/Dockerfile
    container_name: signapps-securelink
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    cap_add:
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3006:3000"
    networks:
      - signapps-network

  signapps-scheduler:
    build:
      context: .
      dockerfile: services/signapps-scheduler/Dockerfile
    container_name: signapps-scheduler
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3007:3000"
    networks:
      - signapps-network

  signapps-metrics:
    build:
      context: .
      dockerfile: services/signapps-metrics/Dockerfile
    container_name: signapps-metrics
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3008:3000"
    networks:
      - signapps-network

  signapps-media:
    build:
      context: .
      dockerfile: services/signapps-media/Dockerfile
    container_name: signapps-media
    environment:
      DATABASE_URL: postgres://signapps:${DB_PASSWORD:-signapps_dev}@postgres/signapps
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      STT_URL: http://faster-whisper:9000
      TTS_URL: http://piper:5002
      OCR_URL: http://surya-ocr:9003
      RUST_LOG: info,signapps=debug
    depends_on:
      postgres:
        condition: service_healthy
      faster-whisper:
        condition: service_started
      piper:
        condition: service_started
      surya-ocr:
        condition: service_started
    ports:
      - "3009:3009"
    networks:
      - signapps-network

  # === API GATEWAY ===
  traefik:
    image: traefik:v3.0
    container_name: signapps-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@signapps.cloud}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - signapps-network

networks:
  signapps-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  vllm_cache:
  traefik_certs:
  whisper_cache:
  piper_data:
  surya_cache:
